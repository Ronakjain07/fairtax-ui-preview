<script>
  // Mobile hamburger menu functionality
  (function() {
    const hamburgerBtn = document.querySelector('.hamburger-btn');
    const mobileNav = document.getElementById('mobileNav');

    if (!hamburgerBtn || !mobileNav) return;

    // Toggle menu on hamburger click
    hamburgerBtn.addEventListener('click', function() {
      const isOpen = hamburgerBtn.getAttribute('aria-expanded') === 'true';
      hamburgerBtn.setAttribute('aria-expanded', !isOpen);
      mobileNav.classList.toggle('open');
      document.body.classList.toggle('nav-open');
    });

    // Close menu when a link is clicked
    const navLinks = mobileNav.querySelectorAll('.mobile-nav-link');
    navLinks.forEach(link => {
      link.addEventListener('click', function() {
        hamburgerBtn.setAttribute('aria-expanded', 'false');
        mobileNav.classList.remove('open');
        document.body.classList.remove('nav-open');
      });
    });

    // Close menu when clicking outside
    document.addEventListener('click', function(event) {
      const isClickInside = mobileNav.contains(event.target) || hamburgerBtn.contains(event.target);
      if (!isClickInside && mobileNav.classList.contains('open')) {
        hamburgerBtn.setAttribute('aria-expanded', 'false');
        mobileNav.classList.remove('open');
        document.body.classList.remove('nav-open');
      }
    });

    // Mark active nav link based on current page
    const currentPage = window.location.pathname.split('/').pop() || 'landing.html';
    navLinks.forEach(link => {
      const href = link.getAttribute('href');
      if (href === currentPage || (currentPage === '' && href === 'landing.html')) {
        link.classList.add('active');
      }
    });

    // Also mark desktop nav
    const desktopNavLinks = document.querySelectorAll('.desktop-nav .nav-link');
    desktopNavLinks.forEach(link => {
      const href = link.getAttribute('href');
      if (href === currentPage || (currentPage === '' && href === 'landing.html')) {
        link.classList.add('active');
      }
    });
  })();
</script>
